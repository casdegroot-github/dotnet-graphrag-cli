services:
  neo4j:
    image: neo4j:5.15.0
    container_name: code-graph-indexer-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - code_graph_data:/data
      - code_graph_plugins:/plugins

volumes:
  code_graph_data:
  code_graph_plugins:
