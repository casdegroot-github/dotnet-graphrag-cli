services:
  neo4j:
    image: neo4j:5
    container_name: ${GRAPHRAG_NAME:-graphrag}
    labels:
      - graphragcli
    ports:
      - "${GRAPHRAG_HTTP_PORT:-7474}:7474"
      - "${GRAPHRAG_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${GRAPHRAG_PASSWORD:-password123}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - data:/data
      - plugins:/plugins

volumes:
  data:
  plugins: